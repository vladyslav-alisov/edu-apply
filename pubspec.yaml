name: edu_apply
description: ""

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.7+8

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.2
  collection: ^1.18.0
  country_picker: ^2.0.26
  country_code_picker: ^3.0.0
  dots_indicator: ^4.0.1
  easy_debounce: ^2.0.3
  email_validator: ^3.0.0
  equatable: ^2.0.5
  file_picker: ^10.3.10
  flex_color_scheme: ^8.4.0
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  fpdart: ^1.1.0
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  lottie: ^3.1.2
  modal_bottom_sheet: ^3.0.0
  open_file: ^3.5.8
  package_info_plus: ^9.0.0
  path_provider: ^2.1.1
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  share_plus: ^12.0.1
  url_launcher: ^6.2.6
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: any
  change_app_package_name: ^1.4.0
  flutter_lints: ^6.0.0
  build_runner: any
  flutter_native_splash: ^2.4.7
  flutter_gen_runner:


flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21


flutter_gen:
  output: lib/core/const/ # Optional (default: lib/const/)
  line_length: 120


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Black.ttf
        - asset: fonts/Poppins-BlackItalic.ttf
          style: italic
        - asset: fonts/Poppins-Bold.ttf
        - asset: fonts/Poppins-BoldItalic.ttf
          style: italic
        - asset: fonts/Poppins-ExtraBold.ttf
        - asset: fonts/Poppins-ExtraBoldItalic.ttf
          style: italic
        - asset: fonts/Poppins-ExtraLight.ttf
        - asset: fonts/Poppins-ExtraLightItalic.ttf
          style: italic
        - asset: fonts/Poppins-Italic.ttf
        - asset: fonts/Poppins-Light.ttf
        - asset: fonts/Poppins-LightItalic.ttf
          style: italic
        - asset: fonts/Poppins-Medium.ttf
        - asset: fonts/Poppins-MediumItalic.ttf
          style: italic
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-SemiBold.ttf
        - asset: fonts/Poppins-SemiBoldItalic.ttf
          style: italic
        - asset: fonts/Poppins-Thin.ttf
        - asset: fonts/Poppins-ThinItalic.ttf
          style: italic